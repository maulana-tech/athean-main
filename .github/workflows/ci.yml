name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check every Python source
        run: python tests/_syntax_check.py
      - name: Agent-prompts drift check
        # Fails if the bundled web prompts in
        # apps/web/lib/agent-prompts.ts drift from the upstream files
        # at services/boule/src/boule/prompts/*.md.
        run: python tests/check_agent_prompts.py

  python-unit-tests:
    runs-on: ubuntu-latest
    needs: python-syntax
    strategy:
      fail-fast: false
      matrix:
        service:
          - athean-core
          - areopagus
          - boule
          - apollo
          - argos
          - strategos
          - parthenon
          - ostrakon
          - moirai
          - underworld
          - chronos
          - pythia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip deps
        run: |
          python -m pip install --upgrade pip
          # Keep this list in sync with the dependency surface every
          # service module imports at test time. Heavy / optional deps
          # (chromadb, sentence-transformers, spacy, tradingview-screener,
          # slowapi, alembic, vaderSentiment) stay out — every consumer
          # imports them lazily and tests stub or skip cleanly when absent.
          pip install pytest pytest-asyncio pydantic pydantic-settings tenacity \
            structlog redis httpx anthropic eth-utils "eth-hash[pycryptodome]" \
            web3 numpy scikit-learn apscheduler hypothesis prometheus-client \
            google-generativeai openai
      - name: Run tests for ${{ matrix.service }}
        shell: bash
        run: |
          set -e
          PY_PATH="packages/athean-core/src"
          case "${{ matrix.service }}" in
            athean-core) DIR="packages/athean-core" ;;
            *)             DIR="services/${{ matrix.service }}"; PY_PATH="$PY_PATH:$DIR/src" ;;
          esac
          PYTHONPATH="$PY_PATH" python -m pytest "$DIR/tests" -q

  python-integration:
    runs-on: ubuntu-latest
    needs: python-syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pydantic pydantic-settings tenacity \
            structlog redis httpx anthropic eth-utils "eth-hash[pycryptodome]" \
            web3 numpy scikit-learn apscheduler hypothesis prometheus-client \
            google-generativeai openai
      - run: python -m pytest tests/test_pipeline_integration.py -q

  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # foundryup hits api.github.com to resolve release tags. Without an
      # auth token the runner IP shares the 60-req/hr unauth pool and the
      # request returns 403 under load. GITHUB_TOKEN bumps us to 5000/hr.
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Stable, not nightly — upstream foundry-rs removed the
          # rolling nightly tag, so `foundryup --install nightly`
          # errors with "could not find a nightly release tag".
          version: stable
          # Token MUST be passed as an INPUT (not env). The action
          # exports it to the foundryup subprocess so the curl calls
          # against api.github.com don't hit the 60-req/hr unauth
          # rate limit and 403. Passing via `env:` does not propagate
          # into the spawned shell foundryup runs under.
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: forge build
        run: forge build --root contracts
      - name: forge test (full suite)
        # Run every Foundry test, including ProofOfRestraint.t.sol — the
        # flagship contract must be exercised in CI, not skipped.
        run: forge test --root contracts -vv

  halmos:
    # Symbolic verification of immutable contracts (ProofOfRestraint,
    # PantheonConstitution). Spec files: contracts/test/*Symbolic.t.sol.
    runs-on: ubuntu-latest
    needs: foundry
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Stable, not nightly — upstream foundry-rs removed the
          # rolling nightly tag, so `foundryup --install nightly`
          # errors with "could not find a nightly release tag".
          version: stable
          # Token MUST be passed as an INPUT (not env). The action
          # exports it to the foundryup subprocess so the curl calls
          # against api.github.com don't hit the 60-req/hr unauth
          # rate limit and 403. Passing via `env:` does not propagate
          # into the spawned shell foundryup runs under.
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Halmos (pinned)
        # Pinning the version stops unpinned-latest regressions from
        # taking down CI when upstream cuts a release. 0.3.3 is the
        # version this workspace was validated against — bump only
        # after re-running symbolic checks locally first.
        run: pip install 'halmos==0.3.3'
      - name: forge build
        run: forge build --root contracts
      - name: halmos symbolic checks
        # Invoke via the module so we don't depend on ~/.local/bin
        # being on PATH inside the action runner. Same behaviour as
        # the bare `halmos` binary, more robust to PATH drift.
        run: python -m halmos --root contracts --solver-timeout-assertion 30000

  slither:
    # Static analysis on Solidity sources. Free, OSS, fast (~30s).
    # Slither is configured to fail only on high-severity findings —
    # informational and low warnings are surfaced but non-blocking
    # until we triage them, so the gate stays useful without being
    # noisy.
    runs-on: ubuntu-latest
    needs: foundry
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Stable, not nightly — upstream foundry-rs removed the
          # rolling nightly tag, so `foundryup --install nightly`
          # errors with "could not find a nightly release tag".
          version: stable
          # Token MUST be passed as an INPUT (not env). The action
          # exports it to the foundryup subprocess so the curl calls
          # against api.github.com don't hit the 60-req/hr unauth
          # rate limit and 403. Passing via `env:` does not propagate
          # into the spawned shell foundryup runs under.
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: forge build
        run: forge build --root contracts
      - name: slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          fail-on: high
          slither-config: contracts/slither.config.json
          solc-version: 0.8.24

  pip-audit:
    # Dependency-vulnerability scan against the PyPA advisory DB. No
    # secrets needed, no cost, runs in ~10s. Blocks CI on a known CVE
    # — bump the offending dep or pin a fixed version.
    runs-on: ubuntu-latest
    needs: python-syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python deps
        # We audit the explicit dep surface the unit-tests install
        # rather than every service's transitive tree — keeps the
        # signal:noise ratio high.
        #
        # Ignored vulnerabilities (each with a real reason):
        #
        #   PYSEC-2024-277 (joblib pickle deserialisation)
        #     Joblib's pickle loader treats untrusted .pkl files as
        #     unsafe. Pulled in transitively by scikit-learn. We use
        #     sklearn only to fit Platt + isotonic calibrators in-
        #     process, never to load user-supplied joblib pickles, so
        #     the attack vector is not present. PyPA shows no fix
        #     version at time of pinning. Re-evaluate quarterly.
        run: |
          pip-audit \
            --ignore-vuln PYSEC-2024-277 \
            -r <(cat <<'EOF'
          pytest
          pytest-asyncio
          pydantic
          pydantic-settings
          tenacity
          structlog
          redis
          httpx
          anthropic
          eth-utils
          eth-hash[pycryptodome]
          web3
          numpy
          scikit-learn
          apscheduler
          hypothesis
          prometheus-client
          google-generativeai
          openai
          EOF
          )

  actionlint:
    # Lints the workflow files themselves. Catches typoed action
    # versions, malformed YAML, undefined env refs, etc — before
    # the next push tries (and fails) to run them.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true
