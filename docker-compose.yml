name: athean-trades

x-python-env: &python-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  POLYMARKET_API_KEY: ${POLYMARKET_API_KEY:-}
  POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-}
  POLYMARKET_API_PASSPHRASE: ${POLYMARKET_API_PASSPHRASE:-}
  DATABASE_URL: postgresql+asyncpg://athean:athean@postgres:5432/athean
  REDIS_URL: redis://redis:6379/0
  IPFS_API_URL: http://ipfs:5001
  RPC_URL: ${RPC_URL:-https://rpc.sepolia.mantle.xyz}
  CHAIN_ID: ${CHAIN_ID:-5003}
  PRIVATE_KEY: ${PRIVATE_KEY:-}
  PARTHENON_REGISTRY_ADDRESS: ${PARTHENON_REGISTRY_ADDRESS:-}
  ERC8004_REGISTRY_ADDRESS: ${ERC8004_REGISTRY_ADDRESS:-}
  REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
  REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
  IRYS_JWK_PATH: ${IRYS_JWK_PATH:-}
  EXECUTION_MODE: ${EXECUTION_MODE:-paper}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  STRUCTLOG_JSON: "1"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: athean
      POSTGRES_PASSWORD: athean
      POSTGRES_DB: athean
    ports: ["5432:5432"]
    volumes:
      - athean-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athean -d athean"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - athean-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"
      - "8080:8080"
    volumes:
      - athean-ipfs:/data/ipfs
    healthcheck:
      test: ["CMD-SHELL", "ipfs id > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *python-env
      CORS_ORIGINS: "http://localhost:3000"
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      ipfs:     { condition: service_started }
    restart: unless-stopped

  pythia:
    build:
      context: .
      dockerfile: services/pythia/Dockerfile
    environment: *python-env
    ports: ["8008:8008"]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  apollo:
    build:
      context: .
      dockerfile: services/apollo/Dockerfile
    environment: *python-env
    ports: ["8001:8001"]
    depends_on:
      redis: { condition: service_healthy }
      pythia: { condition: service_started }
    restart: unless-stopped

  boule:
    build:
      context: .
      dockerfile: services/boule/Dockerfile
    environment: *python-env
    ports: ["8002:8002"]
    depends_on:
      redis: { condition: service_healthy }
      apollo: { condition: service_started }
    restart: unless-stopped

  areopagus:
    build:
      context: .
      dockerfile: services/areopagus/Dockerfile
    environment: *python-env
    ports: ["8003:8003"]
    depends_on:
      redis: { condition: service_healthy }
      boule: { condition: service_started }
    restart: unless-stopped

  strategos:
    build:
      context: .
      dockerfile: services/strategos/Dockerfile
    environment: *python-env
    ports: ["8004:8004"]
    depends_on:
      redis: { condition: service_healthy }
      areopagus: { condition: service_started }
    restart: unless-stopped

  argos:
    build:
      context: .
      dockerfile: services/argos/Dockerfile
    environment: *python-env
    ports: ["8005:8005"]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  parthenon:
    build:
      context: .
      dockerfile: services/parthenon/Dockerfile
    environment: *python-env
    ports: ["8007:8007"]
    depends_on:
      redis: { condition: service_healthy }
      ipfs:  { condition: service_started }
    restart: unless-stopped

  ostrakon:
    build:
      context: .
      dockerfile: services/ostrakon/Dockerfile
    environment: *python-env
    ports: ["8006:8006"]
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on:
      api: { condition: service_started }
    restart: unless-stopped

  # ── Observability stack ─────────────────────────────────────────
  # Prometheus scrapes the /metrics endpoint each council service
  # exposes on port 9464. Grafana ships with a pre-baked dashboard
  # at http://localhost:3001 (admin / athean).
  prometheus:
    image: prom/prometheus:v3.2.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - athean-prom:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
    ports: ["9090:9090"]
    restart: unless-stopped

  # Hourly Postgres pg_dump + Redis BGSAVE -> ./backups on the host.
  # Retention is BACKUP_RETENTION_DAYS days (default 14). Override the
  # cadence via BACKUP_INTERVAL_SECONDS (default 3600).
  backup:
    build:
      context: ./infra/backup
    environment:
      PG_HOST: postgres
      PG_USER: athean
      PG_DB: athean
      PGPASSWORD: athean
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-3600}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - athean-redis:/redis-data:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  # Chaos sidecar. Gated behind the `chaos` profile so normal up does
  # NOT include it. Apply scenarios via infra/chaos/apply-scenarios.sh.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    profiles: ["chaos"]
    ports:
      - "8474:8474"   # admin API
      - "16379:16379" # redis proxy
      - "15432:15432" # postgres proxy
      - "18545:18545" # rpc proxy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: athean
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - athean-grafana:/var/lib/grafana
    ports: ["3001:3000"]
    depends_on:
      prometheus: { condition: service_started }
    restart: unless-stopped

volumes:
  athean-pg:
  athean-redis:
  athean-ipfs:
  athean-prom:
  athean-grafana:
