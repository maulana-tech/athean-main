[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
multiline_func_header = "params_first"

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"
arc_testnet_drpc = "https://arc-testnet.drpc.org"
local = "http://localhost:8545"

[etherscan]
arc_testnet = { key = "${ARCSCAN_KEY}", url = "https://testnet.arcscan.app/api", chain = 5042002 }
