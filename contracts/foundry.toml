[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
multiline_func_header = "params_first"

[rpc_endpoints]
mantle_sepolia = "https://rpc.sepolia.mantle.xyz"
mantle_mainnet = "https://rpc.mantle.xyz"
local = "http://localhost:8545"

[etherscan]
mantle_sepolia = { key = "${MANTLESCAN_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/5003/etherscan", chain = 5003 }
mantle_mainnet = { key = "${MANTLESCAN_KEY}", url = "https://api.mantlescan.xyz/api",                               chain = 5000 }
